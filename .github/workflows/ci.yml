name: Backend CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  pytest-and-rag:
    name: Pytest & RAG eval
    runs-on: ubuntu-latest

    env:
      EMBEDDING_PROVIDER: hash
      VECTOR_STORE_PROVIDER: chroma
      RERANKER_PROVIDER: heuristic
      OPENAI_API_KEY: ''
      PINECONE_API_KEY: ''
      WRITER_API_KEY: ''
      LLM_API_KEY: ''
      COHERE_API_KEY: ''
      RESEND_API_KEY: ''
      ELEVENLABS_API_KEY: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

      - name: Run RAG eval
        shell: bash
        run: |
          set -o pipefail
          python scripts/eval_rag.py --json | tee rag-eval-report.json

      - name: Upload RAG eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-report
          path: rag-eval-report.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Notify backend build status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'Backend CI / pytest-and-rag',
              description: state === 'success'
                ? 'Backend tests and RAG eval passed'
                : 'Backend tests or RAG eval failed - do not merge'
            })
